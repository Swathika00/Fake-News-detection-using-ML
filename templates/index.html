{% extends "base.html" %}

{% block title %}Home - Fake News Detection{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white">
                    <h4 class="mb-0"><i class="fas fa-search"></i> Analyze News Article</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('predict') }}">
                        <div class="mb-3">
                            <label for="news_text" class="form-label">Enter News Text</label>
                            <textarea class="form-control" id="news_text" name="news_text" 
                                      rows="8" placeholder="Paste your news article text here..." 
                                      required></textarea>
                            <div class="form-text">Enter the news article text you want to analyze for authenticity.</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-search"></i> Analyze News
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
